<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixIt — Engineer Portal</title>
    <style>
        /* CSS REMAINS THE SAME FOR CONSISTENCY */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; }

        header {
            background-color: #2563eb;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { color: white; text-decoration: none; font-size: 14px; }
        nav a:hover { text-decoration: underline; }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }

        .form-section { background: white; padding: 30px; border-radius: 8px; margin-top: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: Arial; }

        footer { text-align: center; padding: 20px; color: #777; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">FixIt</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="tickets.html">Raise Ticket</a></li>
                <li><a href="engineer_portal.html">Engineer Portal</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <section class="form-section">
            <h2>Engineer Registration</h2>
            <p>Become a service partner. Fill out the application details below.</p>
            <br>
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <select>
                        <option>Electrical</option>
                        <option>Plumbing</option>
                        <option>IT / Technical</option>
                        <option>General Maintenance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Experience (Years)</label>
                    <input type="number" placeholder="e.g. 5">
                </div>
                <div class="form-group">
                    <label>Brief Bio</label>
                    <textarea rows="4" placeholder="Tell us about your technical skills and background..."></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Submit Registration</button>
            </form>
        </section>
    </div>

    <footer>&copy; 2026 FixIt Platform. Built for simplicity.</footer>

</body>
</html>
